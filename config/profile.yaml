# ── Langues (bonus si match) ──
languages:
  french_english_bonus: 10
  english_only_bonus: 8
  french_only_bonus: 8
  dutch_nice_to_have_bonus: 5

# Patterns regex (insensibles à la casse) qui DÉCLENCHENT un rejet
# si pas d'alternative anglaise mentionnée dans la même offre.
dutch_required_patterns:
  - "dutch\\s+is\\s+mandatory"
  - "dutch\\s+(b2|c1|c2)\\s+(required|mandatory)"
  - "(b2|c1|c2)\\s+(level\\s+)?(in\\s+)?dutch"
  - "nederlands\\s+(b2|c1|c2)"
  - "moedertaal\\s+nederlands"
  - "native\\s+dutch"
  - "fluent\\s+(in\\s+)?dutch.*(required|mandatory|must)"
  - "n[eé]erlandais\\s+courant\\s+(exig[eé]|requis|obligatoire)"

# Patterns indiquant que l'anglais OU le français est une alternative valide
# → si l'un de ces patterns matche, le rejet "dutch_required" ne s'applique pas.
language_alternative_patterns:
  - "english\\s+(or|ou)\\s+dutch"
  - "dutch\\s+(or|ou)\\s+english"
  - "french\\s+(or|ou)\\s+dutch"
  - "english\\s+is\\s+sufficient"
  - "english-?speaking\\s+(team|environment)"

# ── Expérience ──
experience:
  reject_patterns:  # rejet (score = 0) si match dans description
    - "5\\+\\s*years?"
    - "5\\s*-\\s*\\d+\\s*years?"
    - "minimum\\s+5\\s+years?"
    - "at\\s+least\\s+5\\s+years?"
    - "senior\\b"
    - "\\blead\\b"
    - "\\bmanager\\b"
    - "team\\s+lead"
    - "\\bprincipal\\b"
  penalty_3y: -10  # "3+ years" / "3-5 years"
  penalty_3y_patterns:
    - "3\\+\\s*years?"
    - "minimum\\s+3\\s+years?"
    - "at\\s+least\\s+3\\s+years?"

# ── Diplôme ──
education:
  master_mandatory_penalty: -20
  bachelor_required_penalty: -5
  master_mandatory_patterns:
    - "master.*(required|mandatory|must)"
    - "msc\\s+(required|mandatory)"
    - "(required|mandatory).*master"
  bachelor_required_patterns:
    - "bachelor.*(required|mandatory)"
    - "bsc\\s+(required|mandatory)"
  master_with_alternative_patterns:  # désamorce le penalty
    - "master\\s+or\\s+equivalent"
    - "master.*or\\s+relevant\\s+experience"
    - "bachelor\\s+or\\s+master"

# ── Bornes du score final ──
score_bounds:
  min: 0
  max: 100
  technical_keywords_cap: 30
