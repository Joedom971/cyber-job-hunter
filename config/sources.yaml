# ─── Sources de scraping — config par scraper ───
# `enabled: true` → la source est scrapée par `scripts/run_scrape.py`
# `enabled: false` → ignorée (utile pour debug ou Sprint à venir)
#
# Chaque source hérite des `defaults` puis override ce dont elle a besoin.

defaults:
  rate_limit_seconds: 3
  jitter_max_seconds: 1.5
  max_pages: 5
  timeout_seconds: 15
  max_retries: 3
  backoff_base_seconds: 5  # backoff = base * (3 ** attempt) → 5 / 15 / 45
  user_agent: "JobHunterBot/1.0 (+contact: johanhatchi@proton.me)"
  respect_robots_txt: true
  min_hours_between_runs: 12

# ─── Sprint 1 — actifs ─────────────────────────────────────────────────
sources:

  remotive:
    enabled: true
    type: rest_api
    base_url: https://remotive.com/api/remote-jobs
    # TOS Remotive: max 4 req/jour, 24h delay sur les données, attribution obligatoire.
    # On respecte avec un rate limit large + 1 run / 12h.
    rate_limit_seconds: 21600  # 6h entre 2 requêtes hypothétiques (safe vs TOS)
    max_pages: 1               # endpoint renvoie tout en 1 appel (~20-30 jobs)
    notes: "TOS strictes - https://remotive.com/api-documentation"

  nviso:
    enabled: true
    type: html
    base_url: https://www.nviso.eu/jobs/
    company_name_override: NVISO
    country_default: BE
    notes: "Cyber pure-player BE. Quitté Recruitee en avril 2026 → HTML statique."

  itsme:
    enabled: true
    type: recruitee
    base_url: https://itsme.recruitee.com/api/offers/
    company_name_override: itsme
    country_default: BE
    notes: "Scale-up Brussels digital identity"

  easi:
    enabled: true
    type: html
    base_url: https://www.easi.net/en/jobs
    company_name_override: EASI
    country_default: BE
    notes: "ESN BE, IT/cyber, careers HTML statique"

